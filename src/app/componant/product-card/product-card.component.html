 <div class="card"  style="width: 18rem;">
    <img [src]="dynamicProduct.images" class="card-img-top" alt="...">


    <div class="card-body" filter:searchtext>
      <h3 class="card-title"><span>Name</span>{{dynamicProduct.title}} </h3>
      <h3 class="card-title"> <span>Price</span>{{dynamicProduct.price}}</h3>
      <p class="card-text"><span>description</span>>{{dynamicProduct.description}}</p>
      
      <a href="#" class="btn btn-primary">Add to Cart</a>
    </div>


  </div>
